apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: pebble-acme
spec:
  acme:
    email: devnull@localhost
    server: https://pebble.pebble.svc.cluster.local:14000/dir
    skipTLSVerify: true
    privateKeySecretRef:
      name: pebble-acme-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
