apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-auto
  namespace: sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-auto
  template:
    metadata:
      labels:
        app: hello-auto
    spec:
      containers:
        - name: hello
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hello-auto
  namespace: sandbox
spec:
  selector:
    app: hello-auto
  ports:
    - port: 80
      targetPort: 80
