apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-localhost-cert
  namespace: sandbox
spec:
  secretName: app-localhost-tls
  dnsNames:
    - app.localhost
  issuerRef:
    name: local-ca-issuer
    kind: ClusterIssuer
  usages:
    - digital signature
    - key encipherment
    - server auth
