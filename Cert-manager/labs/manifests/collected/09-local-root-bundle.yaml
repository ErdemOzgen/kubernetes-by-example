apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: local-root-bundle
spec:
  sources:
    - secret:
        name: root-ca-secret
        key: tls.crt
        namespace: cert-manager
  target:
    configMap:
      key: ca-bundle.crt
    namespaceSelector:
      matchLabels:
        purpose: cert-manager-labs
