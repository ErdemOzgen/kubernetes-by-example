apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-pebble
  namespace: sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-pebble
  template:
    metadata:
      labels:
        app: hello-pebble
    spec:
      containers:
        - name: hello
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hello-pebble
  namespace: sandbox
spec:
  selector:
    app: hello-pebble
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-pebble
  namespace: sandbox
  annotations:
    cert-manager.io/cluster-issuer: pebble-acme
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - pebble.localhost
      secretName: pebble-localhost-tls
  rules:
    - host: pebble.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello-pebble
                port:
                  number: 80
