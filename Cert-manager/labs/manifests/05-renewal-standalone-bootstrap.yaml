apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: renewal-selfsigned
spec:
  selfSigned: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: renewal-nginx
  namespace: sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: renewal-nginx
  template:
    metadata:
      labels:
        app: renewal-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: renewal-nginx
  namespace: sandbox
spec:
  selector:
    app: renewal-nginx
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: renewal-demo-cert
  namespace: sandbox
spec:
  secretName: renewal-demo-tls
  commonName: renewal.localhost
  dnsNames:
    - renewal.localhost
  issuerRef:
    kind: ClusterIssuer
    name: renewal-selfsigned
  privateKey:
    algorithm: RSA
    size: 2048
    rotationPolicy: Always
  usages:
    - digital signature
    - key encipherment
    - server auth
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: renewal-nginx
  namespace: sandbox
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - renewal.localhost
      secretName: renewal-demo-tls
  rules:
    - host: renewal.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: renewal-nginx
                port:
                  number: 80
